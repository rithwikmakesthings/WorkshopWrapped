; o1 Bridge ESP32 Starter - PlatformIO config
; https://docs.platformio.org/page/projectconf.html
;
; Default env is `esp32dev` (classic ESP32-WROOM). Switch to your board by
; passing -e on the command line, e.g. `pio run -e esp32s3 -t upload`.

[platformio]
default_envs = esp32dev

[common]
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
build_flags =
    -DBRIDGE_HOSTNAME=\"o1bridge\"
    -DBRIDGE_PORT=80
    -DBRIDGE_USE_SECRETS
lib_deps =
    bblanchon/ArduinoJson @ ^7.2.0

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
build_flags = ${common.build_flags} -DBOARD_LED_PIN=2
lib_deps = ${common.lib_deps}
upload_speed = 921600

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
build_flags = ${common.build_flags} -DBOARD_LED_PIN=48 -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps = ${common.lib_deps}

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
build_flags = ${common.build_flags} -DBOARD_LED_PIN=8
lib_deps = ${common.lib_deps}
